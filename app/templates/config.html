<!DOCTYPE html>
<html>
<head>
    <title>Configuración Router MK System Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .status-section {
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #dee2e6;
        }
        
        .status-item:last-child {
            border-bottom: none;
        }
        
        .status-label {
            font-weight: bold;
            color: #333;
        }
        
        .status-value {
            color: #666;
            font-family: monospace;
        }
        
        .status-icon {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-connected .status-icon {
            background-color: #28a745;
        }
        
        .status-disconnected .status-icon {
            background-color: #dc3545;
        }
        
        .status-text {
            font-weight: bold;
        }
        
        .status-connected .status-text {
            color: #28a745;
        }
        
        .status-disconnected .status-text {
            color: #dc3545;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }
        
        input[type="text"],
        input[type="password"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        
        .button-group-three {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background-color: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #5568d3;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background-color: #28a745;
            color: white;
        }
        
        .btn-success:hover {
            background-color: #218838;
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.4);
        }
        
        .btn-danger {
            background-color: #dc3545;
            color: white;
        }
        
        .btn-danger:hover {
            background-color: #c82333;
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.4);
        }
        
        .btn-info {
            background-color: #17a2b8;
            color: white;
        }
        
        .btn-info:hover {
            background-color: #138496;
            box-shadow: 0 4px 12px rgba(23, 162, 184, 0.4);
        }
        
        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert-success {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        
        .alert-danger {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        
        .alert-info {
            background-color: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }
        
        .alert.show {
            display: block;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 10px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 MK System Pro</h1>
        <p class="subtitle">Gestión de Routers Mikrotik</p>
        
        <!-- Alertas -->
        <div id="alert" class="alert"></div>
        <div id="loading" class="loading">
            <span class="spinner"></span>
            <span>Procesando...</span>
        </div>
        
        <!-- Sección de Estado de Conexión -->
        <div class="status-section">
            <div class="status-item">
                <span class="status-label">Estado de Conexión:</span>
                <span id="connection-status" class="status-text status-disconnected">
                    <span class="status-icon"></span>
                    Desconectado
                </span>
            </div>
            <div class="status-item">
                <span class="status-label">Nombre del Router:</span>
                <span class="status-value" id="router-name">-</span>
            </div>
            <div class="status-item">
                <span class="status-label">IP del Router:</span>
                <span class="status-value" id="router-ip">-</span>
            </div>
            <div class="status-item">
                <span class="status-label">Versión:</span>
                <span class="status-value" id="router-version">-</span>
            </div>
        </div>
        
        <!-- Formulario de Configuración -->
        <form id="configForm">
            <div class="form-group">
                <label for="host">🔒 IP del Router</label>
                <input type="text" id="host" name="host" placeholder="192.168.191.16" required>
            </div>
            
            <div class="form-group">
                <label for="username">👤 Usuario</label>
                <input type="text" id="username" name="username" placeholder="admin" required>
            </div>
            
            <div class="form-group">
                <label for="password">🔐 Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            
            <div class="form-group">
                <label for="port">🔌 Puerto</label>
                <input type="number" id="port" name="port" value="8728" required>
            </div>
            
            <!-- Botones de Acción -->
            <div class="button-group-three">
                <button type="submit" class="btn-primary">💾 Guardar</button>
                <button type="button" class="btn-success" onclick="testConnection()">🧪 Test Conexión</button>
                <button type="button" class="btn-danger" onclick="disconnect()">🔌 Desconectar</button>
            </div>
        </form>
        
        <!-- Botón para actualizar estado -->
        <div class="button-group" style="margin-top: 15px;">
            <button type="button" class="btn-info" onclick="loadConnectionStatus()">🔄 Actualizar Estado</button>
        </div>
    </div>
    
    <script>
        // Cargar estado al iniciar
        document.addEventListener('DOMContentLoaded', function() {
            loadConnectionStatus();
            loadSavedConfig();
        });
        
        // Cargar configuración guardada
        function loadSavedConfig() {
            fetch('/api/get-config')
                .then(response => response.json())
                .then(data => {
                    if (data.config) {
                        document.getElementById('host').value = data.config.host || '';
                        document.getElementById('username').value = data.config.username || '';
                        document.getElementById('port').value = data.config.port || 8728;
                    }
                })
                .catch(error => console.log('No hay configuración guardada'));
        }
        
        // Cargar estado de conexión
        function loadConnectionStatus() {
            showLoading(true);
            fetch('/api/connection-status')
                .then(response => response.json())
                .then(data => {
                    const statusEl = document.getElementById('connection-status');
                    
                    if (data.connected) {
                        statusEl.classList.remove('status-disconnected');
                        statusEl.classList.add('status-connected');
                        statusEl.innerHTML = '<span class="status-icon"></span><span class="status-text">Conectado</span>';
                        
                        document.getElementById('router-name').textContent = data.identity || '-';
                        document.getElementById('router-ip').textContent = data.host || '-';
                        document.getElementById('router-version').textContent = data.version || '-';
                    } else {
                        statusEl.classList.remove('status-connected');
                        statusEl.classList.add('status-disconnected');
                        statusEl.innerHTML = '<span class="status-icon"></span><span class="status-text">Desconectado</span>';
                        
                        document.getElementById('router-name').textContent = '-';
                        document.getElementById('router-ip').textContent = '-';
                        document.getElementById('router-version').textContent = '-';
                    }
                    showLoading(false);
                })
                .catch(error => {
                    console.error('Error:', error);
                    showLoading(false);
                    document.getElementById('connection-status').classList.add('status-disconnected');
                });
        }
        
        // Test de conexión
        function testConnection() {
            const host = document.getElementById('host').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const port = document.getElementById('port').value;
            
            if (!host || !username || !password) {
                showAlert('warning', 'Por favor completa todos los campos');
                return;
            }
            
            showLoading(true);
            
            fetch('/api/test-connection', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    host: host,
                    username: username,
                    password: password,
                    port: parseInt(port)
                })
            })
            .then(response => response.json())
            .then(data => {
                showLoading(false);
                if (data.success) {
                    showAlert('success', `✅ Conexión exitosa! Router: ${data.identity}`);
                    loadConnectionStatus();
                } else {
                    showAlert('danger', `❌ Error: ${data.message}`);
                }
            })
            .catch(error => {
                showLoading(false);
                showAlert('danger', `❌ Error en la conexión: ${error.message}`);
            });
        }
        
        // Desconectar
        function disconnect() {
            if (confirm('¿Estás seguro de que deseas desconectarte?')) {
                showLoading(true);
                fetch('/api/disconnect', { method: 'POST' })
                    .then(response => response.json())
                    .then(data => {
                        showLoading(false);
                        showAlert('success', '✅ Desconectado correctamente');
                        loadConnectionStatus();
                    })
                    .catch(error => {
                        showLoading(false);
                        showAlert('danger', `❌ Error: ${error.message}`);
                    });
            }
        }
        
        // Guardar configuración
        document.getElementById('configForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('host', document.getElementById('host').value);
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);
            formData.append('port', document.getElementById('port').value);
            
            showLoading(true);
            
            fetch('/config', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                showLoading(false);
                if (data.status === 'saved') {
                    showAlert('success', '✅ Configuración guardada correctamente');
                    loadConnectionStatus();
                } else {
                    showAlert('danger', `❌ Error: ${data.message}`);
                }
            })
            .catch(error => {
                showLoading(false);
                showAlert('danger', `❌ Error: ${error.message}`);
            });
        });
        
        // Mostrar/ocultar alertas
        function showAlert(type, message) {
            const alertEl = document.getElementById('alert');
            alertEl.className = `alert alert-${type} show`;
            alertEl.textContent = message;
            
            setTimeout(() => {
                alertEl.classList.remove('show');
            }, 5000);
        }
        
        // Mostrar/ocultar loading
        function showLoading(show) {
            const loading = document.getElementById('loading');
            if (show) {
                loading.classList.add('show');
            } else {
                loading.classList.remove('show');
            }
        }
    </script>
</body>
</html>
